# SoftX Website - Kamal Deployment Config
# Copy to bawadev/soft-tech-website repo as config/deploy.yml
# Reference: server-credentials.md
# Uses Traefik (from Appwrite) for reverse proxy and SSL

service: softx-website
image: ghcr.io/bawadev/soft-tech-website

servers:
  web:
    hosts:
      - 185.211.6.206
    labels:
      traefik.enable: "true"
      traefik.constraint-label-stack: "appwrite"
      traefik.http.routers.softx-website.rule: "Host(`dev.softx.world`)"
      traefik.http.routers.softx-website.entrypoints: "appwrite_websecure"
      traefik.http.routers.softx-website.tls: "true"
      traefik.http.routers.softx-website.tls.certresolver: "dns"
      traefik.http.services.softx-website.loadbalancer.server.port: "3000"
      traefik.docker.network: "gateway"
    options:
      network: gateway

registry:
  server: ghcr.io
  username: bawadev
  password:
    - KAMAL_REGISTRY_PASSWORD

ssh:
  user: root

# Disable kamal-proxy - using Traefik instead
proxy: false

env:
  clear:
    NODE_ENV: production
  secret:
    - KAMAL_REGISTRY_PASSWORD

builder:
  arch: amd64
