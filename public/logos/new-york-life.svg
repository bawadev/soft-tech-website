<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 80" fill="none">
  <rect width="240" height="80" fill="white"/>
  <!-- New York Life logo with iconic eagle symbol -->
  <g>
    <!-- Eagle emblem -->
    <circle cx="40" cy="40" r="28" fill="#003087"/>
    <path d="M 40 20 L 35 30 L 40 28 L 45 30 Z" fill="white"/>
    <path d="M 30 40 Q 40 35, 50 40" stroke="white" stroke-width="2" fill="none"/>
    <rect x="38" y="45" width="4" height="10" fill="white"/>

    <!-- Text -->
    <text x="80" y="32" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#003087" letter-spacing="-0.5">
      NEW YORK LIFE
    </text>
    <text x="80" y="50" font-family="Arial, sans-serif" font-size="10" fill="#003087">
      Insurance Company
    </text>
  </g>
</svg>
